<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales History - City Choice Bakers</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="back.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f6f6f6;
padding:20px;
}

/* Header Section with History Icon */
.header{
background:linear-gradient(135deg,#ff2b2b,#111);
color:#fff;
padding:25px 20px;
border-radius:20px;
text-align:center;
margin-bottom:20px;
position: relative;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.header img.logo{
width:70px;
height:70px;
border-radius:50%;
background:#fff;
padding:4px;
margin-bottom:8px;
}

.header h2{
font-size:22px;
letter-spacing: 0.5px;
text-transform: uppercase;
}

.header .page-tag {
background: rgba(255, 255, 255, 0.2);
display: inline-flex;
align-items: center;
gap: 8px;
padding: 6px 16px;
border-radius: 20px;
font-size: 13px;
margin-top: 8px;
font-weight: 500;
backdrop-filter: blur(5px);
border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Salesman Badge mini */
.salesman-mini-badge {
background: rgba(0, 0, 0, 0.3);
border-radius: 12px;
padding: 10px 15px;
margin-top: 15px;
display: flex;
align-items: center;
justify-content: space-between;
font-size: 13px;
text-align: left;
}

.salesman-mini-badge span b {
color: #ff2b2b;
}

/* Actions Bar */
.action-bar {
display: flex;
gap: 10px;
margin-bottom: 20px;
}

.back-btn {
flex: 1;
background: #fff;
color: #333;
border: 1px solid #ddd;
padding: 12px;
border-radius: 12px;
font-weight: 600;
font-size: 14px;
cursor: pointer;
display: inline-flex;
align-items: center;
justify-content: center;
gap: 8px;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
text-decoration: none;
}

.back-btn:hover {
background: #eee;
}

/* Card layout */
.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

.card h3{
margin-bottom:15px;
font-size: 16px;
color: #333;
display: flex;
align-items: center;
gap: 8px;
}

/* History Box Styles */
.history-container {
max-height: 500px;
overflow-y: auto;
border-radius: 12px;
border: 1px solid #eee;
}

.history-table {
width: 100%;
border-collapse: collapse;
background: #fff;
font-size: 13px;
text-align: left;
}

.history-table th {
background: #333;
color: #fff;
padding: 14px 10px;
font-weight: 500;
position: sticky;
top: 0;
z-index: 10;
}

.history-table td {
padding: 14px 10px;
border-bottom: 1px solid #eee;
vertical-align: middle;
}

.history-table tr:nth-child(even) {
background: #f9f9f9;
}

.badge-pay {
padding: 3px 8px;
border-radius: 6px;
font-size: 11px;
font-weight: 600;
text-transform: uppercase;
}
.bg-cash { background: #dcfce7; color: #16a34a; }
.bg-online { background: #e0f2fe; color: #0369a1; }
.bg-mpay { background: #f3e8ff; color: #7e22ce; }

.text-danger { color: #dc2626; font-weight: 600; }
.text-success { color: #16a34a; font-weight: 600; }

.note-text {
font-size: 11px;
color: #666;
font-style: italic;
display: block;
margin-top: 4px;
}
</style>
</head>
<body>

<div class="header">
    <img src="logo.png" class="logo" alt="City Choice Logo">
    <h2>CITY CHOICE BAKERS</h2>
    <div class="page-tag">
        <i class="fa-solid fa-clock-rotate-left"></i> Sales History Logs
    </div>
    
    <div class="salesman-mini-badge">
        <div><i class="fa-solid fa-user"></i> Salesman: <span id="smName">Loading...</span></div>
        <div><i class="fa-solid fa-shop"></i> <span id="smShop">Loading...</span></div>
    </div>
</div>

<div class="action-bar">
    <a href="addsale.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Sales Entry
    </a>
</div>

<div class="card">
    <h3><i class="fa-solid fa-list-check" style="color: #ff2b2b;"></i> All Recorded Sales</h3>
    <div class="history-container">
        <table class="history-table">
            <thead>
                <tr>
                    <th>Shop / Client</th>
                    <th>Total</th>
                    <th>Paid</th>
                    <th>Balance</th>
                    <th>Mode</th>
                </tr>
            </thead>
            <tbody id="fullHistoryBody">
                <tr>
                    <td colspan="5" style="text-align:center; padding:30px; color:#999;">
                        <i class="fa-solid fa-spinner fa-spin"></i> Fetching records from database...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
// --- DIRECT INLINE SUPABASE CREDENTIALS SETUP ---
const SUPABASE_URL = "https://ftuchilcswtnnldrugir.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWNoaWxjc3d0bm5sZHJ1Z2lyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNjAyNDQsImV4cCI6MjA5NDczNjI0NH0.88SWE5lvsJD0Fw8x7h4pgAmq1WFRN1qMvmXHCXeDqsU";           

let db;
let salesman;
let currentSalesmanEmail = "";

// 1. DATABASE INITIALIZATION
try {
    if (typeof supabase !== 'undefined') {
        db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } else {
        console.error("Supabase CDN package missing.");
    }
} catch(err) {
    console.error("Database initialization failed:", err.message);
}

// 2. CHECK USER SESSION
try {
    salesman = JSON.parse(localStorage.getItem("salesman"));
    if(!salesman){
        window.location.href = "salesmanlogin.html";
    } else {
        currentSalesmanEmail = salesman.email || "";
        document.getElementById("smName").innerText = salesman.username || salesman.name || "Salesman";
        document.getElementById("smShop").innerText = salesman.shop_name || "Assigned Shop";
    }
} catch(e) {
    console.error("Session reading failed:", e.message);
}

// 3. FETCH COMPLETE LOGS FOR LOGGED IN SALESMAN
async function fetchFullHistory(){
    try {
        if (!db || !currentSalesmanEmail) {
            document.getElementById("fullHistoryBody").innerHTML = `<tr><td colspan="5" style="text-align:center; padding:20px; color:red;">Authentication Failed!</td></tr>`;
            return;
        }

        const { data, error } = await db
            .from("shop_sale")
            .select("*")
            .eq("salesman_email", currentSalesmanEmail)
            .order("created_at", { ascending: false });

        if (error) throw error;

        let html = "";
        if(!data || data.length === 0){
            html = `<tr><td colspan="5" style="text-align:center; padding:30px; color:#999;"><i class="fa-solid fa-folder-open" style="font-size:24px; display:block; margin-bottom:8px;"></i> No sale records found for your account.</td></tr>`;
        } else {
            data.forEach(row => {
                let badgeClass = row.payment_method === "Online" ? "bg-online" : (row.payment_method === "Mpay" ? "bg-mpay" : "bg-cash");
                let balanceStyle = row.remaining_amount > 0 ? "text-danger" : "text-success";
                
                // Agar notes ho to dikhaye warna khaali rakhe
                let notesHtml = row.notes ? `<span class="note-text"><b>Note:</b> ${row.notes}</span>` : "";

                html += `
                    <tr>
                        <td>
                            <b>${row.shop_name || 'N/A'}</b><br>
                            <span style="font-size:11px; color:#666;">${row.customer_name || 'No Name'}</span>
                            ${notesHtml}
                        </td>
                        <td>₹${row.total_amount}</td>
                        <td>₹${row.paid_amount}</td>
                        <td class="${balanceStyle}">₹${row.remaining_amount}</td>
                        <td><span class="badge-pay ${badgeClass}">${row.payment_method}</span></td>
                    </tr>`;
            });
        }
        document.getElementById("fullHistoryBody").innerHTML = html;
    } catch (err) {
        console.error("History fetch error:", err.message);
        document.getElementById("fullHistoryBody").innerHTML = `<tr><td colspan="5" style="text-align:center; color:#dc2626; padding:20px; font-weight:600;">Error loading logs from Supabase.</td></tr>`;
    }
}

// Execute on load
window.onload = function() {
    fetchFullHistory();
};
</script>
<script src="back.js"></script>
</body>
</html>
